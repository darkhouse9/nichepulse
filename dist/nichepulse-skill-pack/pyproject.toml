[project]
name = "nichepulse"
version = "1.0.0"
description = "AI-powered niche scoring and market research CLI for creators and entrepreneurs"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
authors = [{name = "OWL", email = "team@nichepulse.dev"}]
dependencies = [
    "click>=8.0",
    "rich>=13.0",
    "requests>=2.31",
    "pydantic>=2.0",
    "aiohttp>=3.9",
]

[project.scripts]
nichepulse = "nichepulse.cli:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
